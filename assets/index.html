<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Online Focus Group</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/forms.css">
</head>
<body>

  <button class="lang-toggle" id="langToggle" type="button">English</button>

  <main class="card">
    <div class="card__eyebrow" data-i18n="eyebrow">مجموعة تركيز خاصة</div>
    <h1 class="card__title" data-i18n="title">مرحباً بك</h1>
    <p class="card__subtitle" data-i18n="subtitle">يرجى إدخال بياناتك للمتابعة</p>

    <form id="entryForm" novalidate>
      <div class="field" id="nameField">
        <label for="fullName" data-i18n="nameLabel">الاسم الكامل</label>
        <input type="text" id="fullName" name="fullName" autocomplete="name" data-i18n-placeholder="namePlaceholder">
        <div class="field-error" data-i18n="nameError">يرجى إدخال الاسم الكامل</div>
      </div>

      <div class="field" id="phoneField">
        <label for="phoneNumber" data-i18n="phoneLabel">رقم الهاتف</label>
        <input type="tel" id="phoneNumber" name="phoneNumber" autocomplete="tel" data-i18n-placeholder="phonePlaceholder">
        <div class="field-error" data-i18n="phoneError">يرجى إدخال رقم هاتف صحيح</div>
      </div>

      <button type="submit" class="btn-primary" data-i18n="submitBtn">متابعة</button>
    </form>

    <p class="card__footnote" data-i18n="footnote">محتوى هذه الصفحة سري ومخصص للمشاركين المدعوين فقط</p>
  </main>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/entry.js"></script>
</body>
</html>
