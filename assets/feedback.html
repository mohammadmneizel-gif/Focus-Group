<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Online Focus Group — Feedback</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/forms.css">
</head>
<body>

  <button class="lang-toggle" id="langToggle" type="button">English</button>

  <main class="card card--wide card--tall" id="feedbackCard">

    <div class="card__eyebrow" data-i18n="eyebrow">استمارة التقييم</div>
    <h1 class="card__title" data-i18n="title">رأيك يهمنا</h1>
    <p class="card__subtitle" data-i18n="subtitle">يرجى تعبئة الاستمارة التالية بصدق</p>

    <form id="feedbackForm" novalidate>

      <!-- Overall -->
      <div class="slider-field">
        <div class="slider-field__row">
          <label data-i18n="overall">التقييم العام</label>
          <span class="slider-value" id="val_overall">5</span>
        </div>
        <input type="range" min="1" max="10" value="5" id="overall" name="overall">
      </div>

      <h2 class="section-title" data-i18n="sectionRatings">تقييمات تفصيلية</h2>

      <div class="slider-grid">
        <div class="slider-field">
          <div class="slider-field__row"><label data-i18n="story">القصة</label><span class="slider-value" id="val_story">5</span></div>
          <input type="range" min="1" max="10" value="5" id="story" name="story">
        </div>
        <div class="slider-field">
          <div class="slider-field__row"><label data-i18n="characters">الشخصيات</label><span class="slider-value" id="val_characters">5</span></div>
          <input type="range" min="1" max="10" value="5" id="characters" name="characters">
        </div>
        <div class="slider-field">
          <div class="slider-field__row"><label data-i18n="dialogue">الحوار</label><span class="slider-value" id="val_dialogue">5</span></div>
          <input type="range" min="1" max="10" value="5" id="dialogue" name="dialogue">
        </div>
        <div class="slider-field">
          <div class="slider-field__row"><label data-i18n="pacing">الإيقاع</label><span class="slider-value" id="val_pacing">5</span></div>
          <input type="range" min="1" max="10" value="5" id="pacing" name="pacing">
        </div>
        <div class="slider-field">
          <div class="slider-field__row"><label data-i18n="beginning">البداية</label><span class="slider-value" id="val_beginning">5</span></div>
          <input type="range" min="1" max="10" value="5" id="beginning" name="beginning">
        </div>
        <div class="slider-field">
          <div class="slider-field__row"><label data-i18n="middle">المنتصف</label><span class="slider-value" id="val_middle">5</span></div>
          <input type="range" min="1" max="10" value="5" id="middle" name="middle">
        </div>
        <div class="slider-field">
          <div class="slider-field__row"><label data-i18n="ending">النهاية</label><span class="slider-value" id="val_ending">5</span></div>
          <input type="range" min="1" max="10" value="5" id="ending" name="ending">
        </div>
        <div class="slider-field">
          <div class="slider-field__row"><label data-i18n="emotionalImpact">التأثير العاطفي</label><span class="slider-value" id="val_emotionalImpact">5</span></div>
          <input type="range" min="1" max="10" value="5" id="emotionalImpact" name="emotionalImpact">
        </div>
        <div class="slider-field">
          <div class="slider-field__row"><label data-i18n="originality">الأصالة</label><span class="slider-value" id="val_originality">5</span></div>
          <input type="range" min="1" max="10" value="5" id="originality" name="originality">
        </div>
      </div>

      <!-- Recommend -->
      <div class="field">
        <label data-i18n="recommend">هل توصي بهذا العمل؟</label>
        <div class="pill-group" id="recommendGroup">
          <button type="button" class="pill-btn" data-value="Yes" data-i18n="yes">نعم</button>
          <button type="button" class="pill-btn" data-value="Maybe" data-i18n="maybe">ربما</button>
          <button type="button" class="pill-btn" data-value="No" data-i18n="no">لا</button>
        </div>
        <input type="hidden" id="recommend" name="recommend">
      </div>

      <h2 class="section-title" data-i18n="sectionOpen">أسئلة مفتوحة</h2>

      <div class="field">
        <label for="favoriteMoment" data-i18n="favoriteMoment">أفضل لحظة في النص</label>
        <textarea id="favoriteMoment" name="favoriteMoment" rows="2"></textarea>
      </div>
      <div class="field">
        <label for="leastFavoriteMoment" data-i18n="leastFavoriteMoment">أقل لحظة إعجاباً</label>
        <textarea id="leastFavoriteMoment" name="leastFavoriteMoment" rows="2"></textarea>
      </div>
      <div class="field">
        <label for="confusingParts" data-i18n="confusingParts">أجزاء غير واضحة</label>
        <textarea id="confusingParts" name="confusingParts" rows="2"></textarea>
      </div>
      <div class="field">
        <label for="suggestions" data-i18n="suggestions">اقتراحات</label>
        <textarea id="suggestions" name="suggestions" rows="2"></textarea>
      </div>
      <div class="field">
        <label for="additionalComments" data-i18n="additionalComments">ملاحظات إضافية</label>
        <textarea id="additionalComments" name="additionalComments" rows="2"></textarea>
      </div>

      <div style="display: flex; gap: 12px; margin-top: 8px;">
  <button type="button" id="backToScriptBtn" data-i18n="backToScriptBtn" style="flex: 1; background: transparent; border: 1px solid var(--color-surface-border); color: var(--color-text); border-radius: var(--radius-md); font-family: inherit; font-size: 15px; cursor: pointer; transition: all 0.2s;">العودة للنص</button>
  <button type="submit" class="btn-primary" data-i18n="submitBtn" style="flex: 2; margin-top: 0;">إرسال التقييم</button>
</div>
    </form>

    <div class="thank-you" id="thankYou" hidden>
      <div class="card__title" data-i18n="thankYouTitle">شكراً لك</div>
      <p class="card__subtitle" data-i18n="thankYouSubtitle">تم استلام تقييمك بنجاح</p>
      <button type="button" class="btn-primary" id="backToLibraryBtn" data-i18n="backToLibrary">
        العودة إلى النصوص
      </button>
    </div>

  </main>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/feedback.js"></script>
</body>
</html>
